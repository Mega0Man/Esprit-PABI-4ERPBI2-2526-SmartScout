version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: grombalia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grombalia_scout
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.2
    container_name: grombalia-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
    volumes:
      - mlflow_data:/mlflow

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: grombalia-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grombalia-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  backend:
    build:
      context: ./backend
    container_name: grombalia-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/grombalia_scout
      SECRET_KEY: your-secret-key-change-this-in-production-please
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: grombalia-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
