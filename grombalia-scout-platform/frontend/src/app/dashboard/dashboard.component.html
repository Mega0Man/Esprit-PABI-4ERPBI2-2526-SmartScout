<div class="dashboard-container" [ngStyle]="{'background': 'linear-gradient(135deg, ' + roleConfig?.gradientFrom + ' 0%, ' + roleConfig?.gradientTo + ' 100%)'}">
  <nav class="navbar">
    <div class="nav-left">
      <div class="nav-logo">🌿</div>
      <div class="nav-title">
        <h2>GROMBALIA SCOUT GROUP</h2>
        <p>{{ roleConfig?.name }} Dashboard</p>
      </div>
    </div>
    <div class="nav-right">
      <div class="ml-buttons">
        <button *ngIf="role === 'group_leader'" class="ml-nav-btn" (click)="openModel('forecast')">📊 Scout Forecast</button>
        <button *ngIf="role === 'group_leader'" class="ml-nav-btn" (click)="openModel('classification')">🏷️ Classification</button>
        <button *ngIf="role === 'treasurer'" class="ml-nav-btn" (click)="openModel('anomaly')">⚠️ Anomaly Detection</button>
        <button *ngIf="role === 'unit_leader'" class="ml-nav-btn" (click)="openModel('recommendation')">🎯 Recommendation</button>
      </div>
      <span class="user-info">Welcome, {{ currentUser?.username }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </nav>
  <main class="dashboard-content">
    <section class="dashboard-section">
      <div class="section-header">
        <h3>📊 Power BI Reports</h3>
      </div>
      <div class="card powerbi-card">
        <iframe *ngIf="roleConfig?.powerBIUrl" [src]="roleConfig?.powerBIUrl" class="powerbi-iframe" frameborder="0" allowfullscreen="true"></iframe>
        <div *ngIf="!roleConfig?.powerBIUrl" class="powerbi-placeholder">
          <div class="placeholder-icon">📈</div>
          <h4>{{ roleConfig?.name }} Dashboard</h4>
          <p>Power BI report coming soon! Share your embed URL when you have it.</p>
        </div>
      </div>
    </section>
  </main>
</div>
