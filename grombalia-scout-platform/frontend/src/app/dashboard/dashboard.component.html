<div class="dashboard-page">
  <app-navbar [role]="currentThemeRole"></app-navbar>

  <main class="container">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-main">
        <div class="header-titles">
          <h1 class="page-title">{{ getTranslation(role) }} {{ getTranslation('overview') }}</h1>
          <p class="page-subtitle">{{ getTranslation('scout_pilot_space') }}</p>
        </div>
        
        <div class="header-actions" *ngIf="currentLang$ | async as lang">
          <app-audio-button 
            [text]="getAudioText(lang)" 
            [lang]="lang">
          </app-audio-button>
        </div>
      </div>
    </header>

    <!-- Main Content Section -->
    <section class="dashboard-section">
      <div class="section-label-wrapper">
        <span class="section-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
            <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
          </svg>
          {{ getTranslation('power_bi_reports') }}
        </span>
      </div>

      <div class="dashboard-card powerbi-container">
        <div class="powerbi-wrapper" *ngIf="roleConfig?.powerBIUrl">
          <iframe [src]="roleConfig?.powerBIUrl" class="powerbi-iframe" frameborder="0" allowfullscreen="true"></iframe>
        </div>

        <!-- Placeholder if no URL -->
        <div *ngIf="!roleConfig?.powerBIUrl" class="powerbi-placeholder">
          <div class="placeholder-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 20V10"></path>
              <path d="M18 20V4"></path>
              <path d="M6 20v-4"></path>
            </svg>
          </div>
          <h3>{{ getTranslation(role) }} {{ getTranslation('dashboard') }}</h3>
          <p>{{ getTranslation('coming_soon') }}</p>
        </div>
      </div>
    </section>
  </main>
</div>
